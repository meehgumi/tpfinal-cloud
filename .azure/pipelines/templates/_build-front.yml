steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'
    displayName: 'Installer Node.js'

  - script: npm ci
    displayName: 'Installer les dépendances'

  - script: npm run build
    displayName: 'Build Vite'
    env:
      VITE_BUILD_ID: $(Build.SourceVersion)

  - task: PublishPipelineArtifact@1
    inputs:
      targetPath: dist
      artifact: front-dist
    displayName: 'Publier artefact front-dist'
name: Build and Deploy to Azure

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build \
            --build-arg BUILD_ID=${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/vue-app:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/vue-app:latest \
            .

      - name: Push Docker image (SHA + latest)
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/vue-app:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/vue-app:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: TP-CLOUD-CONTAINER-LINUX
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ secrets.DOCKER_USERNAME }}/vue-app:${{ github.sha }}

      - name: Afficher l'URL dans le résumé
        run: |
          echo "### Déploiement réussi" >> $GITHUB_STEP_SUMMARY
          echo "**URL publique :** https://tp-cloud-container-linux.azurewebsites.net" >> $GITHUB_STEP_SUMMARY
          echo "**Image déployée :** \`${{ secrets.DOCKER_USERNAME }}/vue-app:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY